<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Hoa Tặc Hội - Quản lý hoa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

/* container */
.app {
  max-width: 1200px;
  margin: auto;
}

/* title */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* toolbar */
.toolbar {
  position: relative;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 15px;
}

/* button */
button {
  padding: 8px 14px;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #4338ca;
}

/* input */
input {
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
  width: 250px;
  outline: none;
}

input:focus {
  border-color: #4f46e5;
}

/* dropdown */
#suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 6px;

  background: white;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);

  width: 100%;
  max-width: 100%;

  z-index: 999;
  display: none;

max-height: 250px;
overflow-y: auto;

-webkit-overflow-scrolling: touch;
}

/* suggestion item */
#suggestions div:hover {
  background: #f0f4ff;
}

/* table container */
.table-container {
  max-height: 500px;
  overflow: auto;
  border-radius: 15px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* table */
table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

th, td {
  border: 1px solid #eee;
  padding: 10px;
  text-align: center;
}

/* header */
th {
  position: sticky;
  top: 0;
  background: #f9fafc;
  z-index: 2;
}

/* first column */
td:first-child, th:first-child {
  position: sticky;
  left: 0;
  background: white;
  z-index: 1;
  text-align: left;
}

/* hover */
tr:hover td {
  background: #f9fbff;
}

/* mobile */
@media (max-width: 768px) {

  body {
    padding: 10px;
  }

  h2 {
    font-size: 18px;
  }

  .toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  input {
    width: 100%;
    font-size: 16px;
  }

  button {
    width: 100%;
    font-size: 16px;
  }

 .search-box {
    width: 100%;
    max-width: 100%;   /* 🔥 thêm dòng này */
  }

  th, td {
    font-size: 12px;
    padding: 6px;
  }
}

.text-red { color: #e11d48; }
.text-orange { color: #f97316; }
.text-purple { color: #8b5cf6; }
.text-blue { color: #3b82f6; }

.search-box {
  position: relative;
  width: 100%;       /* 🔥 full theo layout */
  max-width: 300px;  /* desktop vẫn đẹp */
}

<td style="text-align:left;padding:12px 16px;">

select {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="app">

<h2>Danh sách hoa sở hữu</h2>

<div class="toolbar" style="position: relative;">
  <button onclick="checkAdmin()">🛠 Chỉnh sửa hoa</button>
  <button onclick="setMode('search')">🔍 Tìm kiếm hoa</button>

  <!-- 👇 THÊM Ở ĐÂY -->
  <select id="userSelect" onchange="render()" style="display:none;">
  <option value="">-- Chọn thành viên --</option>
</select>

  <div class="search-box" id="searchBox">
  <input id="search" placeholder="Tìm hoa..." oninput="handleSearch()" autocomplete="off">
  <div id="suggestions"></div>
</div>
</div>

<div class="table-container">
  <table id="table"></table>
</div>

<script>
const client = window.supabase.createClient(
  "https://csnnjdfrngfxtslrqfmp.supabase.co",
  "sb_publishable_kzbQOGWNKo5e0z7j-GQwmg_LXcJVM2p"
);

let flowers = [];
let users = [];

let mode = "admin";
let isAdmin = false;

function setMode(m) {
  mode = m;

  if (m === "search") {
    document.getElementById("userSelect").style.display = "none";
    document.getElementById("searchBox").style.display = "block"; // 👈 hiện lại
  }

  render();
}

function getColorClass(type) {
  switch ((type || "").toLowerCase()) {
    case "đỏ": return "text-red";
    case "cam": return "text-orange";
    case "tím": return "text-purple";
    case "lam": return "text-blue";
    default: return "";
  }
}

function removeVietnameseTones(str) {
  return str
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/đ/g, "d")
    .replace(/Đ/g, "D")
    .toLowerCase();
}

function checkAdmin() {
  const pass = prompt("Nhập mật khẩu admin");

  if (pass === "hoatac") {
  isAdmin = true;
  mode = "admin";

  document.getElementById("userSelect").style.display = "inline-block";
  document.getElementById("searchBox").style.display = "none"; // 👈 ẩn search

  render();
} else {
    alert("Sai mật khẩu");
  }
}

async function load() {
  const { data: f } = await client.from("flowers").select("*");
  const { data: u } = await client.from("users").select("*");

  flowers = f;
  users = u;

  // 👇 THÊM ĐOẠN NÀY
  const select = document.getElementById("userSelect");

  select.innerHTML = `<option value="">-- Chọn thành viên --</option>`;

  users.forEach(u => {
    select.innerHTML += `<option value="${u.id}">${u.name}</option>`;
  });

  // 👇 giữ nguyên
  render();
}

function render() {
  const keyword = document.getElementById("search")?.value?.toLowerCase() || "";
  const table = document.getElementById("table");
  table.innerHTML = "";

  // 🛠 MODE ADMIN (có checkbox)
  if (mode === "admin") {
  if (!isAdmin) {
    table.innerHTML = "";
    return;
  }

  const selectedUserId = document.getElementById("userSelect").value;

  // ❌ chưa chọn user → không hiện gì
  if (!selectedUserId) {
    table.innerHTML = "<tr><td>👆 Chọn thành viên để quản lý</td></tr>";
    return;
  }

  const selectedUser = users.find(u => u.id == selectedUserId);

  // header chỉ 2 cột
  let header = `<tr>
    <th>Hoa</th>
    <th>${selectedUser.name}</th>
  </tr>`;
  table.innerHTML = header;

  flowers.forEach(f => {
    const checked = selectedUser.flowers?.includes(String(f.id)) ? "checked" : "";

    let row = `
<tr>
  <td style="white-space: nowrap;">
    <div style="display:flex;align-items:center;gap:8px;">
      <img src="${f.flower_img}" 
           style="width:40px;height:40px;border-radius:6px;">
      <span class="${getColorClass(f.flower_type)}">
        ${f.flower_name}
      </span>
    </div>
  </td>

  <td>
    <input type="checkbox"
      ${checked}
      onchange="toggle(${selectedUser.id}, ${f.id}, this.checked)">
  </td>
</tr>
`;

    table.innerHTML += row;
  });

  return;
}

  // 🔍 MODE SEARCH (chỉ hiện người)
  if (!keyword) {
    table.innerHTML = "<tr><td>🔍 Nhập để tìm...</td></tr>";
    return;
  }

  const matchedFlowers = flowers.filter(f =>
  removeVietnameseTones(f.flower_name || "")
  .includes(removeVietnameseTones(keyword))
);

  const flowerIds = matchedFlowers.map(f => String(f.id));

  const matchedUsers = users.filter(u =>
    u.flowers?.some(f => flowerIds.includes(f))
  );

  if (matchedUsers.length === 0) {
    table.innerHTML = "<tr><td>❌ Không có kết quả</td></tr>";
    return;
  }

  let html = "<tr><th>Thành viên có</th></tr>";

  matchedUsers.forEach(u => {
  html += `
<tr>
  <td style="text-align:left;">
    ${u.name}
  </td>
</tr>
`;
});

  table.innerHTML = html;
}

async function toggle(userId, flowerId, isChecked) {
  const user = users.find(u => u.id === userId);

  let list = user.flowers || [];

  if (isChecked) {
    if (!list.includes(String(flowerId)))
      list.push(String(flowerId));
  } else {
    list = list.filter(f => f != flowerId);
  }

  await client
    .from("users")
    .update({ flowers: list })
    .eq("id", userId);

  user.flowers = list;
}

load();

function handleSearch() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const box = document.getElementById("suggestions");

  if (!keyword) {
    box.style.display = "none";
    render();
    return;
  }

  const matched = flowers.filter(f =>
  removeVietnameseTones(f.flower_name || "")
    .includes(removeVietnameseTones(keyword))
);

  if (matched.length === 0) {
    box.style.display = "none";
    render();
    return;
  }

  box.innerHTML = "";

  matched.slice(0, 5).forEach(f => {
    const item = document.createElement("div");
    item.innerHTML = `
  <div style="
    display:flex;
    align-items:center;
    gap:8px;
    white-space: nowrap;   /* 🔥 không xuống dòng */
  ">
    <img src="${f.flower_img}" 
         style="width:30px;height:30px;border-radius:6px;object-fit:cover;">
    <span class="${getColorClass(f.flower_type)}">
  ${f.flower_name}
</span>
  </div>
`;
    item.style.padding = "5px";
    item.style.cursor = "pointer";

    item.onclick = () => {
      document.getElementById("search").value = f.flower_name;
      box.style.display = "none";
      render();
    };

    box.appendChild(item);
  });

  box.style.display = "block";
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".toolbar")) {
    document.getElementById("suggestions").style.display = "none";
  }
});
</script>

</body>
</html>
